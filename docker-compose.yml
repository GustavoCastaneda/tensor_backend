# docker-compose.yml


services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 4000 --reload
    volumes:
      - .:/app
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    
    command: rq worker ingest

    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
