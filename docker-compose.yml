# docker-compose.yml

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tensor_api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 4000 --reload
    volumes:
      - ./:/app
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      - redis
      - qdrant

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tensor_worker
    command: rq worker ingest
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      - redis
      - qdrant
